name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Desencriptar CSV de datos
        # Usa OpenSSL para recuperar el CSV usando la contraseña guardada en los Secrets
        run: |
          openssl enc -aes-256-cbc -d -in "REGISTRO 2025.csv.enc" -out "REGISTRO 2025.csv" \
          -pass pass:"${{ secrets.CSV_PASSWORD }}" -pbkdf2
          
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
